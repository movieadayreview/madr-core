  <text x="250" y="260" text-anchor="middle" dominant-baseline="central" font-size="260" class="letter">M</text>
  <text x="750" y="260" text-anchor="middle" dominant-baseline="central" font-size="260" class="letter">A</text>
  <text x="250" y="740" text-anchor="middle" dominant-baseline="central" font-size="260" class="letter">D</text>
