<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 600" role="img" aria-label="MovieADayReview wordmark">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&amp;display=swap');
      .bg { fill: #0A0A0A; }
      .mark { font-family: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif; font-weight: 700; fill: #D4B254; letter-spacing: 0.04em; }
      .tag { font-family: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif; font-weight: 400; fill: #EDE8DC; opacity: 0.55; letter-spacing: 0.32em; }
    </style>
  </defs>
  <rect width="2400" height="600" class="bg"/>
  <text x="1200" y="300" text-anchor="middle" dominant-baseline="central" font-size="180" class="mark">MOVIE · A · DAY · REVIEW</text>
  <text x="1200" y="450" text-anchor="middle" dominant-baseline="central" font-size="40" class="tag">ONE MOVIE · ONE REVIEW · EVERY DAY</text>
</svg>
